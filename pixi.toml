[workspace]
authors = ["Max Harlynking <harlynkingm@gmail.com>"]
channels = ["conda-forge", "pozzettiandrea"]
name = "Video-to-3D-Animation"
platforms = ["win-64"]
version = "0.1.0"

[tasks]

[dependencies]

# fbx-export: the export_fbx pipeline stage. Isolated in its own environment
# because bpy pins Python tightly to its own release, independent of the rest
# of the ML stack. Sourced from the pozzettiandrea conda channel (not PyPI's
# bpy package) because it's already proven working on Python 3.13 via
# ComfyUI Desktop's own pixi-managed environments on this machine.
[feature.fbx-export.dependencies]
python = "3.13.*"

[feature.fbx-export.dependencies.bpy]
version = "*"
channel = "pozzettiandrea"

[environments.fbx-export]
features = ["fbx-export"]
no-default-feature = true

# main: the shared environment for most pipeline stages (GVHMR, SAM 3.1, etc.).
# Trimmed relative to ComfyUI-MotionCapture's own declared deps: no hydra-core/
# hydra-zen/hydra-colorlog (never actually imported in its code), no
# torch_scatter/dpvo_cuda (DPVO-only, and DPVO is skipped for this project's
# static-camera-only scope), no pycolmap (moving-camera VO only), no pytorch3d
# (replaced by a portable pure-PyTorch shim).
[feature.main.dependencies]
python = "3.13.*"

[feature.main.pypi-dependencies]
# depth-anything-3 (below) unconditionally declares open3d as a PyPI
# dependency, even though nothing in its actual source imports it (confirmed
# by searching its real repo) -- but PyPI has no cp313 wheel for open3d at
# all, which would otherwise break resolution outright. A first attempt
# pulled real open3d in via conda-forge (which does have a py313 win-64
# build), but that silently swapped in a conda-built numpy/BLAS stack that
# conflicts with torch's own bundled OpenMP runtime -- a real, confirmed
# crash (`OMP: Error #15`, a hard `Fatal Python error: Aborted`) during
# stage 2 (GVHMR). Fixed instead with a tiny local stub package
# (vendor/open3d_stub/) that satisfies the declared dependency without
# installing anything real -- safe specifically because nothing ever calls
# `import open3d` in the code paths this project's adapter exercises.
open3d = { path = "vendor/open3d_stub", editable = true }
smplx = ">=0.1.28"
timm = ">=0.9.0"
einops = ">=0.6.0"
roma = ">=1.3.0"
trimesh = ">=3.20.0"
scipy = "*"
scikit-image = ">=0.19.0"
opencv-python-headless = ">=4.8.0"
safetensors = "*"
huggingface-hub = ">=0.16.0"
transformers = ">=4.40.0"
pytest = ">=7.0"
# Was already pulled in transitively by transformers; declared explicitly since
# stage 1/2/4's own per-frame progress bars (pipeline/helpers/progress_reporter.py)
# now import it directly, not just as an incidental dependency of another package.
tqdm = ">=4.60.0"
depth-anything-3 = ">=0.1.1"
# depth-anything-3's own model code imports addict directly (depth_anything_3/model/da3.py)
# but its pyproject.toml never declares it -- a real gap in the upstream package's
# own metadata, confirmed by actually importing the package and hitting this.
addict = "*"

[feature.main.pypi-dependencies.torch]
version = "==2.8.*"
index = "https://download.pytorch.org/whl/cu128"

[feature.main.pypi-dependencies.torchvision]
version = "==0.23.*"
index = "https://download.pytorch.org/whl/cu128"

[environments.main]
features = ["main"]
no-default-feature = true
